name: Update Menu Board

on:
  workflow_dispatch:
  schedule:
    - cron: '10 0 * * 1-5'
    - cron: '40 0 * * 1-5'
    - cron: '10 1 * * 1-5'
    - cron: '40 1 * * 1-5'
    - cron: '10 2 * * 1-5'
    - cron: '40 2 * * 1-5'

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install requests

      - name: Fetch Kakao profile menu images
        run: python scripts/fetch_kakao_profile_images.py

      - name: Rebuild menu page
        run: python scripts/build_menu_page.py

      - name: Commit updated page
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update menu board assets'
          file_pattern: menu-today/index.html menu-today/menu_today.json menu-today/images/*.png menu-today/collection_log.json
