name: Update Menu Board

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - update-menu
  schedule:
    # KST 09:10, 09:40, 10:10, 10:40, 11:10, 11:40 (UTC 00:10, 00:40, 01:10, 01:40, 02:10, 02:40)
    - cron: '10 0 * * 1-5'
    - cron: '40 0 * * 1-5'
    - cron: '10 1 * * 1-5'
    - cron: '40 1 * * 1-5'
    - cron: '10 2 * * 1-5'
    - cron: '40 2 * * 1-5'

permissions:
  contents: write

jobs:
  update-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: python -m pip install requests pillow pytesseract playwright

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-kor

      - name: Fetch Kakao profile menu images
        run: python scripts/fetch_kakao_profile_images.py

      - name: Fetch dynamic menu images
        run: python scripts/fetch_dynamic_menu_images.py

      - name: Update menu json from OCR
        run: python scripts/update_menu_from_ocr.py

      - name: Rebuild menu page
        run: python scripts/build_menu_page.py

      - name: Commit updated page
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'Update menu board assets'
          file_pattern: menu-today/index.html menu-today/menu_today.json menu-today/images/*.png menu-today/collection_log.json menu-today/dynamic_menu_hints.json
